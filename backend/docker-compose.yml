services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: imagelab
      POSTGRES_USER: imagelab
      POSTGRES_PASSWORD: imagelab_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagelab"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        # 国内镜像源（2026年6月实测可用）
        # 轩辕: docker.xuanyuan.me  |  毫秒: docker.1ms.run  |  DaoCloud: docker.m.daocloud.io
        PYTHON_IMAGE: docker.1ms.run/library/python:3.12-slim
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py import_questions &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    ports:
      - "80:8000"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: imagelab
      DB_USER: imagelab
      DB_PASSWORD: imagelab_secret
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@imagelab.local
      DJANGO_SUPERUSER_PASSWORD: admin123

volumes:
  postgres_data:
